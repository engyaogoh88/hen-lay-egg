<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hen Lay Egg 🥚</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  background: #87CEEB;
}
#gameCanvas {
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  border-radius: 0;
  box-shadow: none;
}
#ui {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 16px;
  z-index: 10;
}
#ui .lives { font-size: 20px; }
#ui .score { font-size: 18px; font-weight: bold; color: #FFD700; }
#ui .level { font-size: 14px; color: #90EE90; }
#ui .timer-bar {
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.3);
}
#ui .timer-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77);
  transition: width 0.1s linear;
}
#startScreen, #gameOverScreen, #levelScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  color: white;
  text-align: center;
  padding: 20px;
}
#startScreen h1 { font-size: 48px; color: #FFD700; margin-bottom: 10px; text-shadow: 3px 3px 0 #FF6B6B; }
#startScreen p { font-size: 18px; margin: 5px 0; }
.btn {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 24px;
  font-family: inherit;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  border: none;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255,107,107,0.4);
  transition: transform 0.2s;
}
.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.95); }
#gameOverScreen h2 { font-size: 36px; color: #FF6B6B; }
#levelScreen h2 { font-size: 32px; color: #FFD700; }
.level-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 360px;
  margin: 12px auto;
}
.level-card {
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.15s;
}
.level-card:active { transform: scale(0.95); }
.level-card.unlocked {
  background: rgba(255,255,255,0.2);
  border: 2px solid rgba(255,255,255,0.4);
}
.level-card.locked {
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(100,100,100,0.4);
  opacity: 0.6;
  cursor: not-allowed;
}
.level-num { font-size: 24px; font-weight: bold; }
.level-name { font-size: 11px; margin-top: 4px; opacity: 0.9; }
.level-stars { font-size: 14px; margin-top: 2px; min-height: 18px; }
@media (max-width: 380px) {
  .level-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; max-width: 300px; }
  .level-card { padding: 8px 4px; }
  .level-num { font-size: 20px; }
  .level-name { font-size: 10px; }
}
.hidden { display: none !important; }
#controls {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 50;
}
#controls button {
  width: 70px; height: 70px;
  border-radius: 50%;
  border: 3px solid white;
  background: rgba(255,255,255,0.3);
  color: white;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#controls button:active { background: rgba(255,255,255,0.6); }
@media (min-width: 768px) {
  #controls { display: none; }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui"></div>
<div id="startScreen" class="hidden"></div>
<div id="gameOverScreen" class="hidden"></div>
<div id="levelScreen" class="hidden"></div>
<div id="controls"></div>
<script>
// Polyfill for roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r,r,r,r];
    this.moveTo(x+r[0], y);
    this.lineTo(x+w-r[1], y);
    this.quadraticCurveTo(x+w, y, x+w, y+r[1]);
    this.lineTo(x+w, y+h-r[2]);
    this.quadraticCurveTo(x+w, y+h, x+w-r[2], y+h);
    this.lineTo(x+r[3], y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r[3]);
    this.lineTo(x, y+r[0]);
    this.quadraticCurveTo(x, y, x+r[0], y);
    this.closePath();
  };
}
</script>
<script src="game.js"></script>
</body>
</html>

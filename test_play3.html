<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="viewport" content="width=device-width, initial-scale=1.0">
<title>Hen Lay Egg 🥚</title>
<style>
* { margin: 0; padding: 0; }
body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%); overflow: hidden; }
#gameCanvas { display: block; margin: 0 auto; }
#ui { position: absolute; top: 0; left: 0; right: 0; padding: 8px 16px; background: rgba(0,0,0,0.5); color: white; z-index: 10; }
#startScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; color: white; }
#startScreen h1 { font-size: 48px; color: #FFD700; }
.btn { margin-top: 20px; padding: 15px 40px; font-size: 24px; background: linear-gradient(135deg, #FF6B6B, #FF8E53); border: none; border-radius: 50px; color: white; cursor: pointer; }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui"></div>
<div id="startScreen" class="hidden"></div>
<script src="game.js"></script>
<script>
// Manually start and force a draw
try {
  startup();
  console.log('startup() called, state:', 'game' in window ? 'n/a' : 'n/a');
} catch(e) {
  console.error('startup error:', e.message);
}

// Force draw after a short delay
setTimeout(function() {
  console.log('Forcing draw...');
  // The game loop should be running
}, 1000);
</script>
</body>
</html>

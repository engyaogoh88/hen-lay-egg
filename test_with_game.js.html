<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hen Lay Egg 🥚</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%); overflow: hidden; }
#gameCanvas { display: block; margin: 0 auto; }
#startScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; color: white; padding: 20px; }
#startScreen h1 { font-size: 48px; color: #FFD700; margin-bottom: 10px; }
#startScreen p { font-size: 18px; margin: 5px 0; }
.btn { margin-top: 20px; padding: 15px 40px; font-size: 24px; background: linear-gradient(135deg, #FF6B6B, #FF8E53); border: none; border-radius: 50px; color: white; cursor: pointer; }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="startScreen" class="hidden"></div>
<div id="ui"></div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');

let W = 400, H = 700;
canvas.width = W;
canvas.height = H;

function draw() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#98FB98');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function showStartScreen() {
  console.log('showStartScreen called');
  startScreen.classList.remove('hidden');
  startScreen.innerHTML = '<h1>🐔 Hen Lay Egg 🥚</h1><p>Catch eggs!</p><button class="btn" onclick="alert(\'START\')">🎮 START</button>';
  console.log('innerHTML set:', startScreen.innerHTML.substring(0, 50));
}

// Start
try {
  showStartScreen();
} catch(e) {
  console.error('Error:', e.message);
}

// Also draw on the canvas
draw();
</script>
</body>
</html>
